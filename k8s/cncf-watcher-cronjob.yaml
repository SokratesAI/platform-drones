apiVersion: batch/v1
kind: CronJob
metadata:
  name: cncf-watcher
  namespace: drones
  labels:
    app: cncf-watcher
    app.kubernetes.io/part-of: platform-drones
spec:
  schedule: "0 9 * * 1"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: cncf-watcher
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cncf-watcher
              image: ghcr.io/sokratesai/platform-drones/cncf-watcher:latest
              imagePullPolicy: Always
              env:
                - name: SLACK_BOT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: slack-credentials
                      key: bot-token
                - name: SLACK_CHANNEL
                  value: "#digest"
              volumeMounts:
                - name: snapshot-data
                  mountPath: /data
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
          volumes:
            - name: snapshot-data
              emptyDir: {}
