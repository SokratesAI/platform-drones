apiVersion: batch/v1
kind: CronJob
metadata:
  name: github-activity
  namespace: drones
  labels:
    app: github-activity
    app.kubernetes.io/part-of: platform-drones
spec:
  schedule: "0 7 * * *"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: github-activity
        spec:
          restartPolicy: OnFailure
          containers:
            - name: github-activity
              image: ghcr.io/sokratesai/platform-drones/github-activity:latest
              imagePullPolicy: Always
              env:
                - name: SLACK_BOT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: slack-credentials
                      key: bot-token
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: github-credentials
                      key: token
                - name: SLACK_CHANNEL
                  value: "#digest"
                - name: SLACK_ORG
                  value: "SokratesAI"
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
