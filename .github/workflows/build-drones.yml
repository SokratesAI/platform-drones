name: Build Drones

on:
  push:
    branches:
      - main
    paths:
      - "drones/**"

env:
  REGISTRY: ghcr.io
  ORG: sokratesai
  REPO: platform-drones

jobs:
  build:
    name: Build ${{ matrix.drone }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        drone:
          - daily-digest
          - cncf-watcher
          - github-activity
          - daglig-prompelyd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.drone }}
        uses: docker/build-push-action@v5
        with:
          context: drones/${{ matrix.drone }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.REPO }}/${{ matrix.drone }}:latest
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.REPO }}/${{ matrix.drone }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.drone }}
          cache-to: type=gha,mode=max,scope=${{ matrix.drone }}
